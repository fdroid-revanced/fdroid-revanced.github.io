name: Enqueue F-Droid build

# Dispatches N Build workers. Each warms up then waits on turnstyle (FIFO).
on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many build workers to dispatch"
        type: number
        default: 1
      smoke:
        description: "Smoke mode for the builds"
        type: boolean
        default: false

permissions:
  actions: write

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch build workers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          COUNT="${{ inputs.count }}"
          if [ -z "${COUNT}" ] || [ "${COUNT}" = "null" ]; then
            COUNT=1
          fi
          COUNT="$(printf '%.0f' "$COUNT")"
          if [ "$COUNT" -lt 1 ]; then COUNT=1; fi
          SMOKE="${{ inputs.smoke }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SMOKE=false
          fi
          echo "Dispatching $COUNT worker(s) smoke=${SMOKE}"
          for i in $(seq 1 "$COUNT"); do
            if [ "${SMOKE}" = "true" ]; then
              gh workflow run build-fdroid.yml -R "$REPO" -f smoke=true
            else
              gh workflow run build-fdroid.yml -R "$REPO" -f smoke=false
            fi
            echo "  kicked $i/$COUNT"
          done
