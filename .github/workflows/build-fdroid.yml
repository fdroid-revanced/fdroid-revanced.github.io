name: Build F-Droid repo

on:
  schedule:
    # Every 8h: ~N/K runs/week (N~87, K~4) → ~1 week expected refresh per app
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      smoke:
        description: "Smoke mode (one random package only, faster)"
        type: boolean
        default: false

# No `concurrency:` group — GitHub only keeps 1 in-progress + 1 pending and drops
# older pending runs. FIFO is enforced below with turnstyle so every dispatch/schedule
# stays in the Actions queue and runs in order.

permissions:
  contents: write
  actions: read # turnstyle lists other runs of this workflow

jobs:
  build:
    runs-on: ubuntu-latest
    # Includes time spent waiting in the FIFO queue (GitHub-hosted max is 6h).
    timeout-minutes: 360
    steps:
      - name: FIFO queue (wait for earlier builds)
        uses: softprops/turnstyle@afaccda0f3c0136fb7cb4a734b9b96be03599948 # v3.3.2
        with:
          poll-interval-seconds: 30
          same-branch-only: true
          queue-name: build-fdroid
        # No abort-after-seconds → wait until prior runs finish (within job timeout).

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install host Android tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends aapt apksigner

      - name: Setup mise (java, go, fdroidserver)
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Require signing secret
        env:
          REVANCEDBOT_SIGNING: ${{ secrets.REVANCEDBOT_SIGNING }}
        run: |
          if [ -z "${REVANCEDBOT_SIGNING}" ]; then
            echo "::error::Set repository secret REVANCEDBOT_SIGNING (output of: revancedbot keys generate)"
            exit 1
          fi

      - name: Build F-Droid tree
        env:
          REVANCEDBOT_SIGNING: ${{ secrets.REVANCEDBOT_SIGNING }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # schedule has no inputs; only workflow_dispatch + checkbox → smoke
          SMOKE: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke == true }}
        run: |
          set -euo pipefail
          CACHE="${RUNNER_TEMP}/revancedbot-cache"
          echo "event=${{ github.event_name }} smoke=${SMOKE}"
          if [ "${SMOKE}" = "true" ]; then
            echo "Smoke: one random package via revancedbot smoke"
            GOPROXY=direct go run github.com/lucasew/revancedbot/cmd/revancedbot@main smoke . --cache "$CACHE" --max 1
          else
            echo "Full pipeline via revancedbot run"
            GOPROXY=direct go run github.com/lucasew/revancedbot/cmd/revancedbot@main run . --cache "$CACHE"
          fi

      - name: Publish to main (GitHub Pages source)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f config.yml
          if [ ! -d repo ]; then
            echo "::error::Build produced no repo/ directory — nothing to publish"
            ls -la
            exit 1
          fi
          # Re-sync: earlier queue members may have pushed while we waited.
          git pull --rebase --autostash origin "${{ github.ref_name }}"
          git add -A -- repo metadata
          if git diff --staged --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "chore: update F-Droid repo $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
