name: Build F-Droid repo

# Worker only — schedule/human spam go through "Enqueue F-Droid build".
# No concurrency group: multiple workers may start (setup + warmup in parallel),
# then softprops/turnstyle serializes the actual pipeline after caches are warm.
on:
  workflow_dispatch:
    inputs:
      smoke:
        description: "Smoke mode (one random package only, faster)"
        type: boolean
        default: false

permissions:
  contents: write
  actions: write # drain re-dispatch + turnstyle list runs
  variables: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Includes time spent waiting at turnstyle after warmup (hosted max 6h).
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install host Android tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends aapt apksigner

      - name: Setup mise (java, go, fdroidserver)
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Require signing secret
        env:
          REVANCEDBOT_SIGNING: ${{ secrets.REVANCEDBOT_SIGNING }}
        run: |
          if [ -z "${REVANCEDBOT_SIGNING}" ]; then
            echo "::error::Set repository secret REVANCEDBOT_SIGNING (output of: revancedbot keys generate)"
            exit 1
          fi

      - name: Warm up revancedbot (download + compile before queue wait)
        id: warmup
        run: |
          set -euo pipefail
          RB="${RUNNER_TEMP}/revancedbot"
          echo "Building revancedbot into ${RB}"
          # Prefetch module + build cache while we are still free to race others.
          GOPROXY=direct go build -o "$RB" github.com/lucasew/revancedbot/cmd/revancedbot@main
          "$RB" version || "$RB" -v || true
          echo "path=${RB}" >> "$GITHUB_OUTPUT"

      - name: FIFO turnstyle (wait for earlier builds — after env is warm)
        uses: softprops/turnstyle@afaccda0f3c0136fb7cb4a734b9b96be03599948 # v3.3.2
        with:
          poll-interval-seconds: 30
          same-branch-only: true
          queue-name: build-fdroid
        # No abort-after-seconds → wait until prior runs finish (within job timeout).

      - name: Build F-Droid tree
        env:
          REVANCEDBOT_SIGNING: ${{ secrets.REVANCEDBOT_SIGNING }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE: ${{ inputs.smoke == true }}
          RB: ${{ steps.warmup.outputs.path }}
        run: |
          set -euo pipefail
          CACHE="${RUNNER_TEMP}/revancedbot-cache"
          echo "event=${{ github.event_name }} smoke=${SMOKE} bin=${RB}"
          if [ "${SMOKE}" = "true" ]; then
            echo "Smoke: one random package via revancedbot smoke"
            "$RB" smoke . --cache "$CACHE" --max 1
          else
            echo "Full pipeline via revancedbot run"
            "$RB" run . --cache "$CACHE"
          fi

      - name: Publish to main (GitHub Pages source)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f config.yml
          if [ ! -d repo ]; then
            echo "::error::Build produced no repo/ directory — nothing to publish"
            ls -la
            exit 1
          fi
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git add -A -- repo metadata
          if git diff --staged --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "chore: update F-Droid repo $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Drain build queue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE: ${{ inputs.smoke == true }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          DEPTH="$(gh variable get FDROID_BUILD_QUEUE -R "$REPO" 2>/dev/null || echo 0)"
          case "$DEPTH" in
            ''|*[!0-9]*) DEPTH=0 ;;
          esac
          echo "queue depth before consume=$DEPTH"
          if [ "$DEPTH" -gt 0 ]; then
            NEW=$((DEPTH - 1))
            gh variable set FDROID_BUILD_QUEUE -R "$REPO" --body "$NEW"
            echo "queue depth after consume=$NEW"
            if [ "$NEW" -gt 0 ]; then
              echo "Dispatching next worker ($NEW remaining after this kick)"
              if [ "${SMOKE}" = "true" ]; then
                gh workflow run build-fdroid.yml -R "$REPO" -f smoke=true
              else
                gh workflow run build-fdroid.yml -R "$REPO" -f smoke=false
              fi
            fi
          else
            echo "Queue empty — no further workers"
          fi
