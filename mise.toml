# Toolchain for this F-Droid tree. revancedbot via go run @main (not mise go:).
# GOPROXY=direct: proxy.golang.org can lag on untagged @main/@latest and served a
# tip that still had a go.mod replace, which go run rejects.

[tools]
java = "temurin-21.0.7+6.0.LTS"
go = "1.25.6"
uv = "0.8.4"
"pipx:fdroidserver" = "2.4.5"

[tasks.build-repo]
description = "Full revancedbot pipeline (needs REVANCEDBOT_SIGNING)"
run = '''
GOPROXY=direct go run github.com/lucasew/revancedbot/cmd/revancedbot@main -- run . \
  --cache "${REVANCEDBOT_CACHE:-$HOME/.cache/revancedbot}"
'''
